<section class="hero-container">
  <div class="hero-left">
    <h1>Fumigadoras y control de plagas</h1>
    <p>Soluciones profesionales para hogares y negocios.</p>
    <a routerLink="/contacto" class="btn-primary">Solicitar inspección</a>
  </div>

  <div class="hero-right">
    <div class="hero-carousel">
      <div class="hero-carousel-track">
        @for (slide of slides; track $index) {
          <div class="hero-slide" [class.active]="activeIndex() === $index">
            <h2>{{ slide.title }}</h2>
            <p>{{ slide.eyebrow }}</p>
          </div>
        }
      </div>

      <div class="hero-carousel-dots">
        @for (slide of slides; track $index) {
          <button (click)="goToSlide($index)" [class.active]="activeIndex() === $index">
            {{ $index + 1 }}
          </button>
        }
      </div>
    </div>
  </div>
</section>
