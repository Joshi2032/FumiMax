<section class="contacto-section">
  <div class="contacto-info-block">
    <h2>¿Tienes Plagas?</h2>
    <p class="contacto-descripcion">No esperes más. Contáctanos hoy y obtén una solución rápida y efectiva. Estamos disponibles 24/7 para ayudarte.</p>
    <div class="contacto-info-list">
      <div class="contacto-info-item">
        <span class="contacto-info-icon">📞</span>
        <div>
          <div class="contacto-info-label">Teléfono</div>
          <a href="tel:+525512345678">+52 (55) 1234-5678</a>
        </div>
      </div>
      <div class="contacto-info-item">
        <span class="contacto-info-icon">✉️</span>
        <div>
          <div class="contacto-info-label">Email</div>
          <a href="mailto:info@fumimax.com">info@fumimax.com</a>
        </div>
      </div>
      <div class="contacto-info-item">
        <span class="contacto-info-icon">📍</span>
        <div>
          <div class="contacto-info-label">Dirección</div>
          <span>Av. Protección 123, Col. Seguridad, CDMX</span>
        </div>
      </div>
    </div>

    <label>Mensaje *<textarea name="mensaje" required></textarea></label>
    <button type="submit">Enviar Mensaje</button>
    <a href="https://wa.me/5215512345678?text=Hola%2C%20me%20interesa%20una%20cotizaci%C3%B3n%20de%20fumigaci%C3%B3n" target="_blank" rel="noopener" class="whatsapp-btn">
      <span class="whatsapp-btn-content">
        <span class="whatsapp-icon"></span>
        <span>Contactar por WhatsApp</span>
      </span>
    </a>
  </form>
</section>
