<section class="faq-section">
  <div class="faq-header">
    <h2>Preguntas Frecuentes</h2>
    <p class="faq-descripcion">Resolvemos las dudas más comunes sobre nuestros servicios.</p>
  </div>
  <div class="faq-list">
    @for (faq of faqs(); let idx = $index; track idx) {
      <div class="faq-item" [class.open]="openIndex() === idx">
        <div class="faq-item-header" (click)="toggle(idx)">
          <h3>{{ faq.pregunta }}</h3>
          <span class="faq-toggle">&#9660;</span>
        </div>
        @if (openIndex() === idx) {
          <p>{{ faq.respuesta }}</p>
        }
      </div>
    }
  </div>
</section>
